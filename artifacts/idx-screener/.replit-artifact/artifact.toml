kind = "web"
previewPath = "/"
title = "IDX Screener"
version = "1.0.0"
id = "artifacts/idx-screener"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19002
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/idx-screener run dev"

[services.env]
PORT = "19002"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/idx-screener", "run", "build"]
publicDir = "artifacts/idx-screener/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
